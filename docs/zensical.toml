[project]
docs_dir = "."
nav = [
  {"Home" = "index.md"},
  {"Reference" = [
    {"Cells Lnoi400" = "cells_lnoi400.md"},
    {"Cells Ltoi300" = "cells_ltoi300.md"},
    {"Changelog" = "changelog.md"}
  ]}
]
site_dir = "_build/html"
site_name = "Luxtelligence gdsfactory PDK"
